services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:19092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"

      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8091:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092


  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      - kafka
    command: >
      bash -c "
      
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list 
      
      echo 'Creating topics...';
      
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic articles_data --partitions 4 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic news_data --partitions 4 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic llm_data --partitions 4 --replication-factor 1;

      echo 'Topics created';
      "

  valkey:
    image: valkey/valkey:9.0.3
    container_name: valkey
    ports:
      - "6379:6379"

  news-parser:
    build:
      context: news-parser
    container_name: news-parser
    depends_on:
      - kafka-init
      - valkey
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: "kafka:19092"
      KAFKA_ARTICLES_TOPIC: "articles_data"
      KAFKA_NEWS_TOPIC: "news_data"
      LLM_ADDRESS: "http://llm-container:8080"

  news-gateway:
    build:
      context: news-gateway
    container_name: news-gateway
    depends_on:
      - kafka-init
      - valkey
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: "valkey:6379"
      REDIS_PASSWORD: "password"
      REDIS_NEWS_DB: 1

  cache-service:
    build:
      context: cache-service
    container_name: cache-service
    depends_on:
      - kafka-init
      - valkey
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: "kafka:19092"
      KAFKA_GROUP_ID: "news-consumers"
      KAFKA_ARTICLES_TOPIC: "articles_data"
      KAFKA_LLM_RESPONSE_TOPIC: "llm_data"
      KAFKA_NEWS_TOPIC: "news_data"
      REDIS_ADDR: "valkey:6379"
      REDIS_PASSWORD: "password"
      REDIS_ARTICLES_DB: 0
      REDIS_NEWS_DB: 1
      REDIS_LLM_RESPONSE_DB: 2

  llm-consumer:
    build:
      context: llm-consumer
    container_name: llm-consumer
    depends_on:
      - valkey
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      REDIS_ADDR: "valkey:6379"
      REDIS_PASSWORD: "password"
      REDIS_LLM_RESPONSE_DB: 2