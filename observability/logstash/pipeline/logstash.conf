input {
  gelf {
    port => 12201
  }
}

filter {
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }

    if [app][time] {
      date {
        match => [ "[app][time]", "ISO8601" ]
        target => "@timestamp"
      }
    }

    if [app][level] {
      mutate {
        add_field => { "log_level" => "%{[app][level]}" }
      }
    }

    if [app][trace_id] {
      mutate {
        add_field => { "trace_id" => "%{[app][trace_id]}" }
      }
    }

    if [app][service] {
      mutate {
        add_field => { "service_name" => "%{[app][service]}" }
      }
    }
  }

  if ![service_name] and [container_name] {
    mutate {
      add_field => { "service_name" => "%{[container_name]}" }
    }
  }
}

output {
  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    index => "app-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
