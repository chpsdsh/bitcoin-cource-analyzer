server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /oauth2/ {
    proxy_pass http://oauth2-proxy:4180;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Uri $request_uri;
    proxy_set_header X-Auth-Request-Redirect $scheme://$http_host$request_uri;
  }

  location = /oauth2/auth {
    internal;
    proxy_pass http://oauth2-proxy:4180;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Uri $request_uri;
    proxy_set_header Content-Length "";
    proxy_pass_request_body off;
  }

  location @oauth2_start {
    return 302 $scheme://$http_host/oauth2/start?rd=$scheme://$http_host$request_uri;
  }

  location /news/ {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_start;
    auth_request_set $user $upstream_http_x_auth_request_user;
    auth_request_set $email $upstream_http_x_auth_request_email;
    proxy_pass http://news-gateway:8080;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-User $user;
    proxy_set_header X-Email $email;
  }

  location = /predict {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_start;
    auth_request_set $user $upstream_http_x_auth_request_user;
    auth_request_set $email $upstream_http_x_auth_request_email;
    proxy_pass http://llm-consumer:8080;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-User $user;
    proxy_set_header X-Email $email;
  }

  location = /session {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_start;
    auth_request_set $user $upstream_http_x_auth_request_user;
    auth_request_set $email $upstream_http_x_auth_request_email;
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 "{\"user\":\"$user\",\"email\":\"$email\"}";
  }

  location / {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_start;
    try_files $uri $uri/ /index.html;
  }
}
