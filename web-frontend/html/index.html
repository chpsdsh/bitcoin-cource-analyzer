<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0b0d10;
        --panel: rgba(18, 21, 27, 0.9);
        --panel-strong: rgba(20, 24, 31, 0.98);
        --text: #f3f5f7;
        --muted: #a6b0bd;
        --accent: #5ef0c8;
        --accent-2: #4aa3ff;
        --accent-3: #ffb06b;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
      }

      body[data-theme="light"] {
        --bg: #f3f5f8;
        --panel: rgba(255, 255, 255, 0.94);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --text: #141a24;
        --muted: #5c6777;
        --accent: #009f7a;
        --accent-2: #1f78d1;
        --accent-3: #ce7a31;
        --border: rgba(16, 23, 31, 0.12);
        --shadow: 0 24px 50px rgba(14, 23, 35, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Plus Jakarta Sans", sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 10% -10%, color-mix(in srgb, var(--accent) 25%, transparent), transparent),
          radial-gradient(900px 700px at 90% 10%, color-mix(in srgb, var(--accent-2) 20%, transparent), transparent),
          linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, #000) 100%);
        min-height: 100vh;
        transition: background 0.3s ease, color 0.3s ease;
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 60px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        flex-direction: row;
        gap: 10px;
      }

      .header-text {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .theme-toggle {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .header-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .header-buttons {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .session-summary {
        max-width: 320px;
        text-align: right;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .logout-link {
        text-decoration: none;
      }

      .title {
        font-size: clamp(28px, 3.4vw, 44px);
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 16px;
        max-width: 720px;
        line-height: 1.6;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .chart-panel {
        padding: 10px;
        border-radius: 20px;
        overflow: hidden;
      }

      .prediction {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(240px, 1fr);
        gap: 20px;
        align-items: center;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
      }

      .category-button {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 14px;
        color: var(--text);
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .category-button.active {
        background: linear-gradient(135deg, rgba(94, 240, 200, 0.15), rgba(74, 163, 255, 0.2));
        border-color: rgba(94, 240, 200, 0.8);
        transform: translateY(-1px);
      }

      .predict-actions {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: flex-start;
      }

      .predict-button {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #051014;
        border: none;
        border-radius: 999px;
        padding: 12px 26px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 15px 30px rgba(94, 240, 200, 0.25);
      }

      .predict-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        box-shadow: none;
      }

      .prediction-result {
        font-size: 18px;
        font-weight: 500;
        color: var(--text);
        padding: 12px 16px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        min-height: 52px;
        display: flex;
        align-items: center;
      }

      .prediction-layout {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 10px;
      }

      .prediction-main {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .prediction-arrow {
        font-size: 24px;
        line-height: 1;
      }

      .prediction-arrow.up {
        color: #47d88c;
      }

      .prediction-arrow.down {
        color: #ff5e6b;
      }

      .horizon-icon {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        position: relative;
        cursor: help;
      }

      .horizon-symbol {
        font-size: 16px;
        line-height: 1;
      }

      .horizon-tooltip {
        position: absolute;
        left: 50%;
        bottom: calc(100% + 10px);
        transform: translateX(-50%);
        width: 280px;
        max-width: 80vw;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        color: var(--text);
        font-size: 12px;
        line-height: 1.45;
        box-shadow: var(--shadow);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s ease;
        z-index: 20;
        white-space: pre-line;
      }

      .horizon-icon:hover .horizon-tooltip {
        opacity: 1;
      }

      .horizon-icon:focus .horizon-tooltip,
      .horizon-icon:focus-within .horizon-tooltip,
      .horizon-tooltip.visible {
        opacity: 1;
      }

      .news-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .news-header h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }

      .news-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .news-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        min-height: 240px;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .news-card:hover {
        transform: translateY(-3px);
        border-color: rgba(94, 240, 200, 0.4);
      }

      .news-image {
        border-radius: 12px;
        height: 140px;
        background-size: cover;
        background-position: center;
        background-image: linear-gradient(135deg, rgba(94, 240, 200, 0.2), rgba(74, 163, 255, 0.25));
      }

      .news-title {
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        line-height: 1.4;
      }

      .news-title:hover {
        color: var(--accent);
      }

      .news-meta {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
        margin-top: 10px;
      }

      @media (max-width: 900px) {
        .prediction {
          grid-template-columns: 1fr;
        }

        header {
          flex-direction: column;
        }

        .header-actions {
          align-items: flex-start;
        }

        .header-buttons,
        .session-summary {
          justify-content: flex-start;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="header-text">
          <div class="title">BTR — Bitcoin Trend Recon</div>
          <div class="subtitle">Market context, model predictions, and curated news by category in one place.</div>
        </div>
        <div class="header-actions">
          <div class="session-summary" id="session-summary" data-cy="session-summary">Authorized access only.</div>
          <div class="header-buttons">
            <a class="theme-toggle logout-link" id="logout-link" data-cy="logout-link" href="/oauth2/sign_out?rd=http%3A%2F%2Fhost.docker.internal%3A8086%2Flogout%3Frd%3Dhttp%253A%252F%252Flocalhost%253A8085%252F">Logout</a>
            <button class="theme-toggle" id="theme-toggle" data-cy="theme-toggle">Light</button>
          </div>
        </div>
      </header>

      <section class="panel chart-panel">
        <div class="tradingview-widget-container" style="height: 760px; width: 100%">
          <div class="tradingview-widget-container__widget" style="height: calc(100% - 32px); width: 100%"></div>
          <div class="tradingview-widget-copyright" style="height: calc(100% - 32px); width: 100%">
            <a href="https://www.tradingview.com/symbols/BTCUSD/?exchange=BINANCE" rel="noopener nofollow" target="_blank">
              <span class="blue-text">Bitcoin price</span>
            </a>
            <span class="trademark"> by TradingView</span>
          </div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
            {
            "allow_symbol_change": true,
            "calendar": false,
            "details": false,
            "hide_side_toolbar": true,
            "hide_top_toolbar": false,
            "hide_legend": false,
            "hide_volume": false,
            "hotlist": false,
            "interval": "1",
            "locale": "en",
            "save_image": true,
            "style": "1",
            "symbol": "BINANCE:BTCUSD",
            "theme": "dark",
            "timezone": "Etc/UTC",
            "backgroundColor": "#0F0F0F",
            "gridColor": "rgba(242, 242, 242, 0.06)",
            "watchlist": [],
            "withdateranges": false,
            "compareSymbols": [],
            "studies": [],
            "autosize": true
            }
          </script>
        </div>
      </section>

      <section class="panel prediction">
        <div>
          <h2>Prediction</h2>
          <div class="category-grid" id="category-grid" data-cy="category-grid"></div>
        </div>
        <div class="predict-actions">
          <button class="predict-button" id="predict-button" data-cy="predict-button">Predict</button>
          <div class="prediction-result" id="prediction-result" data-cy="prediction-result">Select categories and run prediction.</div>
          <div class="status" id="prediction-status" data-cy="prediction-status"></div>
        </div>
      </section>

      <section class="panel">
        <div class="news-header">
          <h2>News Feed</h2>
          <div class="status" id="news-status" data-cy="news-status">Loading news...</div>
        </div>
        <div class="news-grid" id="news-grid" data-cy="news-grid"></div>
      </section>
    </main>

    <script>
      const categories = ["environment", "politics", "economy", "technology", "crypto"]
      const categoryGrid = document.getElementById("category-grid")
      const predictionResult = document.getElementById("prediction-result")
      const predictionStatus = document.getElementById("prediction-status")
      const predictButton = document.getElementById("predict-button")
      const newsGrid = document.getElementById("news-grid")
      const newsStatus = document.getElementById("news-status")
      const themeToggle = document.getElementById("theme-toggle")
      const sessionSummary = document.getElementById("session-summary")
      const selectedCategories = new Set()
      const maxNewsItems = 50
      const darkTheme = "dark"
      const lightTheme = "light"

      const applyTheme = (theme) => {
        document.body.setAttribute("data-theme", theme)
        themeToggle.textContent = theme === darkTheme ? "Light" : "Dark"
      }

      const savedTheme = localStorage.getItem("theme") || darkTheme
      applyTheme(savedTheme)

      themeToggle.addEventListener("click", () => {
        const nextTheme = document.body.getAttribute("data-theme") === darkTheme ? lightTheme : darkTheme
        applyTheme(nextTheme)
        localStorage.setItem("theme", nextTheme)
      })

      const loadSession = async () => {
        try {
          const response = await fetch("/session", {
            headers: { Accept: "application/json" },
          })
          if (!response.ok) {
            throw new Error("Session unavailable")
          }

          const data = await response.json()
          const identity = data.email || data.user || "Authorized user"
          sessionSummary.textContent = `Signed in as ${identity}`
        } catch (error) {
          sessionSummary.textContent = "Authorized access only."
        }
      }

      const formatValue = (value) => {
        if (typeof value !== "number") return "No data"
        return value.toFixed(4)
      }

      const horizonIconSymbol = (horizon) => {
        if (horizon === 2) {
          return "⚡︎"
        }
        if (horizon === 0) {
          return "𓆉"
        }
        return "⏱"
      }

      const horizonTooltipText = () => {
        return "Prediction horizon has 3 volatility-based levels:\n𓆉 Very slow reaction (level 1)\n ⏱ Moderate reaction (level 2)\n ⚡︎ Fast reaction (level 3)"
      }

      const setupHorizonTooltip = () => {
        const icon = predictionResult.querySelector(".horizon-icon")
        const tooltip = predictionResult.querySelector(".horizon-tooltip")
        if (!icon || !tooltip) return

        const showTooltip = () => tooltip.classList.add("visible")
        const hideTooltip = () => tooltip.classList.remove("visible")

        icon.addEventListener("mouseenter", showTooltip)
        icon.addEventListener("mouseleave", hideTooltip)
        icon.addEventListener("focus", showTooltip)
        icon.addEventListener("blur", hideTooltip)
      }

      const renderPrediction = (target, current, predHorizon) => {
        const isUp = typeof target === "number" && typeof current === "number" ? target >= current : true
        const arrowSymbol = isUp ? "↗" : "↘"
        const arrowClass = isUp ? "up" : "down"
        const tooltipText = horizonTooltipText()
        predictionResult.innerHTML = `<div class="prediction-layout"><div class="prediction-main"><span class="prediction-arrow ${arrowClass}">${arrowSymbol}</span><span>Target: ${formatValue(target)}</span></div><span class="horizon-icon" aria-label="Prediction horizon" tabindex="0" title="${tooltipText.replace(/\n/g, " ")}"><span class="horizon-symbol">${horizonIconSymbol(predHorizon)}</span><span class="horizon-tooltip">${tooltipText}</span></span></div>`
        setupHorizonTooltip()
      }

      const updatePredictState = () => {
        if (selectedCategories.size === 0) {
          predictionStatus.textContent = "Choose at least one category."
          predictButton.disabled = false
          return
        }
        predictionStatus.textContent = ""
      }

      const createButton = (category) => {
        const button = document.createElement("button")
        button.className = "category-button"
        button.textContent = category
        button.dataset.cy = "category-button"
        button.dataset.category = category
        button.addEventListener("click", () => {
          if (selectedCategories.has(category)) {
            selectedCategories.delete(category)
            button.classList.remove("active")
          } else {
            selectedCategories.add(category)
            button.classList.add("active")
          }
          updatePredictState()
        })
        return button
      }

      categories.forEach((category) => categoryGrid.appendChild(createButton(category)))
      updatePredictState()

      predictButton.addEventListener("click", async () => {
        if (selectedCategories.size === 0) {
          predictionStatus.textContent = "Choose at least one category."
          return
        }

        predictButton.disabled = true
        predictionStatus.textContent = "Requesting prediction..."
        predictionResult.textContent = "Waiting for response..."
        try {
          const response = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ categoriesList: Array.from(selectedCategories) }),
          })
          if (!response.ok) {
            const errorText = await response.text()
            throw new Error(errorText || "Prediction error")
          }
          const data = await response.json()
          renderPrediction(data.target, data.current, data.pred_horizon)
          predictionStatus.textContent = "Prediction updated."
        } catch (error) {
          predictionResult.textContent = "Prediction failed."
          predictionStatus.textContent = error.message
        } finally {
          predictButton.disabled = false
        }
      })

      const createNewsCard = (item) => {
        const card = document.createElement("article")
        card.className = "news-card"
        card.dataset.cy = "news-card"
        card.dataset.category = item.category

        const image = document.createElement("div")
        image.className = "news-image"
        image.dataset.cy = "news-image"
        if (item.socialimage) {
          image.style.backgroundImage = `url("${item.socialimage}")`
        }

        const meta = document.createElement("div")
        meta.className = "news-meta"
        meta.textContent = item.category

        const link = document.createElement("a")
        link.className = "news-title"
        link.dataset.cy = "news-title"
        link.href = item.url
        link.target = "_blank"
        link.rel = "noopener"
        link.textContent = item.title

        card.appendChild(image)
        card.appendChild(meta)
        card.appendChild(link)
        return card
      }

      const loadNews = async () => {
        try {
          const results = await Promise.all(
            categories.map(async (category) => {
              const response = await fetch(`/news/${category}`)
              if (!response.ok) {
                return []
              }
              const data = await response.json()
              const items = Array.isArray(data.news) ? data.news : []
              return items.map((item) => ({
                category: item.category || category,
                title: item.title || "Untitled",
                url: item.url || "#",
                socialimage: item.socialimage || item.socialImage || "",
              }))
            })
          )

          const flat = results.flat().slice(0, maxNewsItems)
          newsGrid.innerHTML = ""

          if (flat.length === 0) {
            newsStatus.textContent = "No news available yet."
            return
          }

          flat.forEach((item) => newsGrid.appendChild(createNewsCard(item)))
          newsStatus.textContent = `Loaded ${flat.length} items`
        } catch (error) {
          newsStatus.textContent = "Failed to load news."
        }
      }

      loadSession()
      loadNews()
    </script>
  </body>
</html>
