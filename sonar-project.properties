sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=false
sonar.python.version=3.10

sonar.sources=auth-provider,cache-service,llm,llm-consumer,news-gateway,news-parser,scripts,web-frontend,.github/workflows
sonar.tests=auth-provider,cache-service,llm,llm-consumer,news-gateway,news-parser,cypress

sonar.test.inclusions=**/*_test.go,**/test_*.py,cypress/**/*.cy.js
sonar.exclusions=**/node_modules/**,**/cypress/downloads/**,**/internal/application/mocks/**,**/mocks/**,**/__pycache__/**,**/*.pyc
sonar.coverage.exclusions=**/*_test.go,cypress/**,web-frontend/**,.github/**,scripts/**,**/cmd/**,**/internal/observability/**,**/internal/adapter/server/middleware.go,llm/observability.py
sonar.cpd.exclusions=**/internal/observability/**,**/internal/adapter/server/middleware.go,llm/observability.py

sonar.go.coverage.reportPaths=coverage/cache-service.out,coverage/llm-consumer.out,coverage/news-gateway.out,coverage/news-parser.out
sonar.python.coverage.reportPaths=coverage/llm-python.xml,coverage/auth-provider-python.xml
