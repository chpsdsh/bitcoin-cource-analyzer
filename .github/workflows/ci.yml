name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "auth-provider/**"
      - "cache-service/**"
      - "cypress/**"
      - "cypress.config.js"
      - "package.json"
      - "package-lock.json"
      - "llm-consumer/**"
      - "llm/**"
      - "news-gateway/**"
      - "news-parser/**"
      - "sonar-project.properties"
      - "web-frontend/**"
      - "docker-compose.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    name: Go CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cache-service
            main_package: ./cmd/cacheservice
          - service: llm-consumer
            main_package: ./cmd/llmconsumer
          - service: news-gateway
            main_package: ./cmd/newsgateway
          - service: news-parser
            main_package: ./cmd/newsparser

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: |
            ${{ matrix.service }}/go.mod
            ${{ matrix.service }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.service }}
          args: --config=.golangci.yml ./...

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ${{ matrix.main_package }}

  llm-ci:
    name: LLM CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: llm/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check imports and syntax
        run: python -m compileall .

  auth-provider-ci:
    name: Auth Provider CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-provider

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: auth-provider/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check imports and syntax
        run: python -m compileall .

  frontend-ci:
    name: Frontend Dockerfile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web-frontend
          file: ./web-frontend/Dockerfile
          push: false

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start frontend via Docker Compose
        run: docker compose up -d --build web-frontend

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8085 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs web-frontend
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend E2E dependencies
        run: npm ci

      - name: Run Cypress E2E suite
        run: CYPRESS_BROWSER=chrome npm run test:e2e

      - name: Stop Docker Compose
        if: always()
        run: docker compose down

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config -q

  sonar:
    name: SonarQube Scan
    runs-on: [self-hosted, macOS, ARM64]
    environment: actions
    needs:
      - go-ci
      - llm-ci
      - auth-provider-ci
      - frontend-ci
      - frontend-e2e
      - compose-validate
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarQube configuration
        run: |
          test -n "${SONAR_HOST_URL}" || { echo "Missing SONAR_HOST_URL secret"; exit 1; }
          test -n "${SONAR_TOKEN}" || { echo "Missing SONAR_TOKEN secret"; exit 1; }
          test -n "${SONAR_PROJECT_KEY}" || { echo "Missing SONAR_PROJECT_KEY repository variable"; exit 1; }

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            auth-provider/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements.txt
          pip install -r auth-provider/requirements.txt

      - name: Prepare coverage directory
        run: mkdir -p coverage

      - name: Generate llm coverage report
        run: pytest --cov=. --cov-report=xml:../coverage/llm-python.xml --cov-report=term-missing
        working-directory: llm

      - name: Generate auth-provider coverage report
        run: pytest --cov=. --cov-report=xml:../coverage/auth-provider-python.xml --cov-report=term-missing
        working-directory: auth-provider

      - name: Generate Go coverage reports
        run: |
          go test ./... -coverprofile="$(pwd)/../coverage/cache-service.out"
        working-directory: cache-service

      - name: Generate llm-consumer coverage report
        run: go test ./... -coverprofile="$(pwd)/../coverage/llm-consumer.out"
        working-directory: llm-consumer

      - name: Generate news-gateway coverage report
        run: go test ./... -coverprofile="$(pwd)/../coverage/news-gateway.out"
        working-directory: news-gateway

      - name: Generate news-parser coverage report
        run: go test ./... -coverprofile="$(pwd)/../coverage/news-parser.out"
        working-directory: news-parser

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ env.SONAR_PROJECT_NAME || github.event.repository.name }}
