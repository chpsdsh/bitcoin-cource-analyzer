name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "cache-service/**"
      - "llm-consumer/**"
      - "llm/**"
      - "news-gateway/**"
      - "news-parser/**"
      - "web-frontend/**"
      - "docker-compose.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    name: Go CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cache-service
            main_package: ./cmd/cacheservice
          - service: llm-consumer
            main_package: ./cmd/llmconsumer
          - service: news-gateway
            main_package: ./cmd/newsgateway
          - service: news-parser
            main_package: ./cmd/newsparser

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: |
            ${{ matrix.service }}/go.mod
            ${{ matrix.service }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.service }}
          args: --config=.golangci.yml ./...

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ${{ matrix.main_package }}

  llm-ci:
    name: LLM CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: llm/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports and syntax
        run: python -m compileall .

  frontend-ci:
    name: Frontend Dockerfile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web-frontend
          file: ./web-frontend/Dockerfile
          push: false

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config -q
