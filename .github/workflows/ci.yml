name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "auth-provider/**"
      - "cache-service/**"
      - "cypress/**"
      - "docker-compose.perf.yml"
      - "cypress.config.js"
      - "jmeter/**"
      - "package.json"
      - "package-lock.json"
      - "llm-consumer/**"
      - "llm/**"
      - "news-gateway/**"
      - "news-parser/**"
      - "perf/**"
      - "scripts/**"
      - "sonar-project.properties"
      - "web-frontend/**"
      - "docker-compose.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    name: Go CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cache-service
            main_package: ./cmd/cacheservice
          - service: llm-consumer
            main_package: ./cmd/llmconsumer
          - service: news-gateway
            main_package: ./cmd/newsgateway
          - service: news-parser
            main_package: ./cmd/newsparser

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: |
            ${{ matrix.service }}/go.mod
            ${{ matrix.service }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.service }}
          args: --config=.golangci.yml ./...

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ${{ matrix.main_package }}

  llm-ci:
    name: LLM CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: llm/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check imports and syntax
        run: python -m compileall .

  auth-provider-ci:
    name: Auth Provider CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-provider

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: auth-provider/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check imports and syntax
        run: python -m compileall .

  frontend-ci:
    name: Frontend Dockerfile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web-frontend
          file: ./web-frontend/Dockerfile
          push: false

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start frontend via Docker Compose
        run: docker compose up -d --build web-frontend

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8085 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs web-frontend
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend E2E dependencies
        run: npm ci

      - name: Run Cypress E2E suite
        run: CYPRESS_BROWSER=chrome npm run test:e2e

      - name: Stop Docker Compose
        if: always()
        run: docker compose down

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config -q

      - name: Validate docker-compose perf override
        run: docker compose -f docker-compose.yml -f docker-compose.perf.yml config -q

  performance-ci:
    name: JMeter Performance CI (${{ matrix.scenario.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: News Smoke
            slug: news-smoke
          - name: News Hot Category
            slug: news-hot-category
          - name: News Mixed Profile
            slug: news-mixed-profile
          - name: News Cache Cold Hot
            slug: news-cache-cold-hot
          - name: LLM Consumer Predict
            slug: llm-consumer-predict
    env:
      COMPOSE_PROJECT_NAME: btca-${{ github.run_id }}-${{ matrix.scenario.slug }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare scripts
        run: chmod +x scripts/run-jmeter.sh scripts/assert-jmeter-results.sh

      - name: Build JMeter runner image
        run: docker build -t btca-jmeter:5.6.3 ./perf/jmeter

      - name: Start performance stack
        run: docker compose -f docker-compose.yml -f docker-compose.perf.yml up -d --build valkey mock-binance news-gateway llm-consumer

      - name: Seed Valkey test data
        run: docker compose -f docker-compose.yml -f docker-compose.perf.yml run --rm valkey-seed

      - name: Wait for internal services
        run: |
          for i in {1..30}; do
            if docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" curlimages/curl:8.8.0 -fsS "http://news-gateway:8080/news/crypto" >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "news-gateway did not become ready"
              docker compose -f docker-compose.yml -f docker-compose.perf.yml ps
              docker compose -f docker-compose.yml -f docker-compose.perf.yml logs news-gateway llm-consumer mock-binance valkey
              exit 1
            fi
            sleep 2
          done

          for i in {1..30}; do
            if docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" curlimages/curl:8.8.0 -fsS -X POST "http://llm-consumer:8080/predict" -H "Content-Type: application/json" -d '{"categoriesList":["crypto"]}' >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "llm-consumer did not become ready"
              docker compose -f docker-compose.yml -f docker-compose.perf.yml ps
              docker compose -f docker-compose.yml -f docker-compose.perf.yml logs news-gateway llm-consumer mock-binance valkey
              exit 1
            fi
            sleep 2
          done

      - name: Run JMeter scenario
        run: |
          mkdir -p "artifacts/${{ matrix.scenario.slug }}"
          case "${{ matrix.scenario.slug }}" in
            news-smoke)
              ./scripts/run-jmeter.sh \
                jmeter/news-gateway-read-csv.jmx \
                artifacts/news-smoke \
                -Jhost=news-gateway \
                -Jport=8080 \
                -Jthreads=5 \
                -Jramp_up=1 \
                -Jloops=4 \
                -Jcategories_file=jmeter/data/news-categories-smoke.csv \
                -Jmax_response_ms=3000
              ./scripts/assert-jmeter-results.sh artifacts/news-smoke/results.jtl 20 0 2000 1000
              ;;
            news-hot-category)
              ./scripts/run-jmeter.sh \
                jmeter/news-gateway-hot-category.jmx \
                artifacts/news-hot-category \
                -Jhost=news-gateway \
                -Jport=8080 \
                -Jcategory=crypto \
                -Jthreads=30 \
                -Jramp_up=1 \
                -Jloops=5 \
                -Jmax_response_ms=4000
              ./scripts/assert-jmeter-results.sh artifacts/news-hot-category/results.jtl 150 0 2500 1200
              ;;
            news-mixed-profile)
              ./scripts/run-jmeter.sh \
                jmeter/news-gateway-read-csv.jmx \
                artifacts/news-mixed-profile \
                -Jhost=news-gateway \
                -Jport=8080 \
                -Jthreads=15 \
                -Jramp_up=2 \
                -Jloops=4 \
                -Jcategories_file=jmeter/data/news-categories-mixed.csv \
                -Jmax_response_ms=3500
              ./scripts/assert-jmeter-results.sh artifacts/news-mixed-profile/results.jtl 60 0 2200 1100
              ;;
            news-cache-cold-hot)
              mkdir -p artifacts/news-cache-cold-hot/cold artifacts/news-cache-cold-hot/hot
              ./scripts/run-jmeter.sh \
                jmeter/news-gateway-read-csv.jmx \
                artifacts/news-cache-cold-hot/cold \
                -Jhost=news-gateway \
                -Jport=8080 \
                -Jthreads=5 \
                -Jramp_up=1 \
                -Jloops=4 \
                -Jcategories_file=jmeter/data/news-categories-smoke.csv \
                -Jmax_response_ms=3500
              ./scripts/assert-jmeter-results.sh artifacts/news-cache-cold-hot/cold/results.jtl 20 0 2500 1300
              ./scripts/run-jmeter.sh \
                jmeter/news-gateway-read-csv.jmx \
                artifacts/news-cache-cold-hot/hot \
                -Jhost=news-gateway \
                -Jport=8080 \
                -Jthreads=10 \
                -Jramp_up=1 \
                -Jloops=4 \
                -Jcategories_file=jmeter/data/news-categories-smoke.csv \
                -Jmax_response_ms=2000
              ./scripts/assert-jmeter-results.sh artifacts/news-cache-cold-hot/hot/results.jtl 40 0 1200 600
              ;;
            llm-consumer-predict)
              ./scripts/run-jmeter.sh \
                jmeter/llm-consumer-predict.jmx \
                artifacts/llm-consumer-predict \
                -Jhost=llm-consumer \
                -Jport=8080 \
                -Jthreads=20 \
                -Jramp_up=2 \
                -Jloops=2 \
                -Jmax_response_ms=8000
              ./scripts/assert-jmeter-results.sh artifacts/llm-consumer-predict/results.jtl 40 0 5000 2500
              ;;
          esac

      - name: Upload JMeter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-${{ matrix.scenario.slug }}
          path: artifacts/${{ matrix.scenario.slug }}

      - name: Stop performance stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.perf.yml down -v

  sonar:
    name: SonarQube Scan
    runs-on: [self-hosted, macOS, ARM64]
    environment: actions
    needs:
      - go-ci
      - llm-ci
      - auth-provider-ci
      - frontend-ci
      - frontend-e2e
      - compose-validate
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarQube configuration
        run: |
          test -n "${SONAR_HOST_URL}" || { echo "Missing SONAR_HOST_URL secret"; exit 1; }
          test -n "${SONAR_TOKEN}" || { echo "Missing SONAR_TOKEN secret"; exit 1; }
          test -n "${SONAR_PROJECT_KEY}" || { echo "Missing SONAR_PROJECT_KEY repository variable"; exit 1; }

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            llm/requirements.txt
            auth-provider/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r llm/requirements.txt
          pip install -r auth-provider/requirements.txt

      - name: Generate cache-service coverage report
        run: |
          mkdir -p ../coverage
          go test ./... -coverprofile="$(pwd)/../coverage/cache-service.out"
        working-directory: cache-service

      - name: Generate llm-consumer coverage report
        run: go test ./... -coverprofile="$(pwd)/../coverage/llm-consumer.out"
        working-directory: llm-consumer

      - name: Generate news-gateway coverage report
        run: go test ./... -coverprofile="$(pwd)/../coverage/news-gateway.out"
        working-directory: news-gateway

      - name: Generate news-parser coverage report
        run: go test ./... -coverprofile="$(pwd)/../coverage/news-parser.out"
        working-directory: news-parser

      - name: Normalize Go coverage paths
        run: |
          sed -i.bak 's#^data-cleaner/#cache-service/#' coverage/cache-service.out
          rm coverage/*.bak

      - name: Generate llm Python coverage report
        run: pytest --cov=. --cov-report=xml:../coverage/llm-python.xml
        working-directory: llm

      - name: Generate auth-provider Python coverage report
        run: pytest --cov=. --cov-report=xml:../coverage/auth-provider-python.xml
        working-directory: auth-provider

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ env.SONAR_PROJECT_NAME || github.event.repository.name }}
